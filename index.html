<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>美容室CLanからの挑戦状</title>
    <style>
        body { margin: 0; font-family: sans-serif; text-align: center; background: #f9f6f0; color: #333; }
        .page { display: none; padding: 20px; }
        .active { display: block; }
        button { padding: 12px 24px; font-size: 18px; margin: 10px; border: none; background: #c5a880; color: white; border-radius: 25px; cursor: pointer; }
        
        /* ゲーム画面の設定 */
        #canvas-container { position: relative; width: 350px; height: 500px; margin: 20px auto; border: 2px solid #333; }
        #maze-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #canvas { position: absolute; top: 0; left: 0; z-index: 2; }
    </style>
</head>
<body>

    <!-- 1. メニュー画面 -->
    <div id="menu-page" class="page active">
        <h1>✂️ 美容室CLanからの挑戦状 ✂️</h1>
        <hr>
        <h3>ステージ選択</h3>
        <button onclick="startGame(1)">ステージ 1</button>
        <button onclick="startGame(2)">ステージ 2</button>
        <br><br>
        <button onclick="alert('設定：BGMや操作感の調整（準備中）')">⚙️ 設定</button>
    </div>

    <!-- 2. ゲーム画面 -->
    <div id="game-page" class="page">
        <h2 id="stage-title">ステージ</h2>
        <button onclick="goBackMenu()">🔙 メニューに戻る</button>
        <button onclick="alert('ゲーム中の設定（準備中）')">⚙️ 設定</button>
        
        <div id="canvas-container">
            <!-- ここに迷路の画像が入ります -->
            <img id="maze-bg" src="https://via.placeholder.com/350x500.png?text=CLan+Maze+Image" alt="迷路">
            <canvas id="canvas" width="350" height="500"></canvas>
        </div>
        <p>指やペンでスタートからゴールまでなぞってね！</p>
    </div>

    <script>
        const menuPage = document.getElementById('menu-page');
        const gamePage = document.getElementById('game-page');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const mazeBg = document.getElementById('maze-bg');

        let isDrawing = false;
        let userPoints = [];

        // 【仮設定】正解のルート（スタート、途中、ゴールの座標）
        // 実際の位置に合わせて数字（ピクセル）を調整します
        const startPoint = { x: 50, y: 50 };
        const checkpoint = { x: 175, y: 250 }; // 通るべき中間の道
        const goalPoint = { x: 300, y: 450 };
        const tolerance = 40; // 判定の甘さ（大きいほどかんたんになる）

        // 画面切り替え：ゲーム開始
        function startGame(stageNum) {
            document.getElementById('stage-title').innerText = `ステージ ${stageNum}`;
            menuPage.classList.remove('active');
            gamePage.classList.add('active');
            resetCanvas();
        }

        // 画面切り替え：メニューに戻る
        function goBackMenu() {
            gamePage.classList.remove('active');
            menuPage.classList.add('active');
        }

        function resetCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            userPoints = [];
            
            // 画面上にスタートとゴールの目印を簡易的に描画
            ctx.fillStyle = "green";
            ctx.beginPath(); ctx.arc(startPoint.x, startPoint.y, 15, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "red";
            ctx.beginPath(); ctx.arc(goalPoint.x, goalPoint.y, 15, 0, Math.PI*2); ctx.fill();
        }

        // --- スマホのタッチ操作を受け付ける仕組み ---
        canvas.addEventListener('touchstart', (e) => {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            userPoints.push({ x, y });
            
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineWidth = 5;
            ctx.strokeStyle = "rgba(0, 0, 255, 0.6)"; // 青い半透明の線
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!isDrawing) return;
            e.preventDefault(); // 画面がスクロールするのを防ぐ
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            userPoints.push({ x, y });

            ctx.lineTo(x, y);
            ctx.stroke();
        });

        canvas.addEventListener('touchend', () => {
            if (!isDrawing) return;
            isDrawing = false;
            checkAnswer();
        });

        // --- 正誤判定の計算 ---
        function checkAnswer() {
            if (userPoints.length < 2) return;

            const first = userPoints[0];
            const last = userPoints[userPoints.length - 1];

            // 1. スタートに触れたか
            const distStart = Math.hypot(first.x - startPoint.x, first.y - startPoint.y);
            const startedCorrect = distStart < tolerance;

            // 2. ゴールに触れたか
            const distGoal = Math.hypot(last.x - goalPoint.x, last.y - goalPoint.y);
            const endedCorrect = distGoal < tolerance;

            // 3. 正しいルートを通ったか（チェックポイントを通過したか）
            let passedCheckpoint = false;
            for (let p of userPoints) {
                const distCp = Math.hypot(p.x - checkpoint.x, p.y - checkpoint.y);
                if (distCp < tolerance) {
                    passedCheckpoint = true;
                }
            }

            // 結果判定
            if (startedCorrect && endedCorrect && passedCheckpoint) {
                alert("✨ 正解！おめでとうございます！ ✨");
            } else {
                alert("残念！もう一度挑戦してみてね。");
                resetCanvas();
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>美容室CLanからの挑戦状</title>
    <style>
        body { margin: 0; font-family: sans-serif; text-align: center; background: #f9f6f0; color: #333; }
        .page { display: none; padding: 20px; }
        .active { display: block; }
        button { padding: 12px 24px; font-size: 16px; margin: 8px; border: none; background: #c5a880; color: white; border-radius: 25px; cursor: pointer; }
        button.admin { background: #5a6268; }
        #canvas-container { position: relative; width: 350px; height: 500px; margin: 20px auto; border: 2px solid #333; background: #eee; }
        #maze-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; display: none; }
        #canvas { position: absolute; top: 0; left: 0; z-index: 2; }
        .info { font-size: 14px; color: #666; margin: 10px; }
    </style>
</head>
<body>

    <div id="menu-page" class="page active">
        <h1>✂️ 美容室CLanからの挑戦状 ✂️</h1>
        <hr>
        <h3>ゲームを遊ぶ</h3>
        <button onclick="startGame()">迷路に挑戦する</button>
        <br><br>
        <h3>管理者メニュー</h3>
        <button class="admin" onclick="openAdmin()">🛠 迷路・正解ルートを登録する</button>
    </div>

    <div id="game-page" class="page">
        <h2 id="page-title">迷路画面</h2>
        <button onclick="goBackMenu()">🔙 メニューに戻る</button>
        
        <div id="admin-controls" style="display: none; background: #e2e3e5; padding: 10px; border-radius: 10px;">
            <p style="margin:5px 0;">1. 迷路画像を選択：<input type="file" id="image-input" accept="image/*"></p>
            <p style="margin:5px 0;">2. スタートからゴールまで**正解のルート**を丁寧になぞってください。</p>
            <button class="admin" onclick="saveData()">💾 このルートを正解として保存</button>
        </div>

        <div id="canvas-container">
            <img id="maze-bg" alt="迷路の背景">
            <canvas id="canvas" width="350" height="500"></canvas>
        </div>
        <p id="guide-text">指やペンでなぞってね！</p>
    </div>

    <script>
        const menuPage = document.getElementById('menu-page');
        const gamePage = document.getElementById('game-page');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const mazeBg = document.getElementById('maze-bg');
        const imageInput = document.getElementById('image-input');
        const adminControls = document.getElementById('admin-controls');
        const pageTitle = document.getElementById('page-title');
        const guideText = document.getElementById('guide-text');

        let isDrawing = false;
        let isAdminMode = false;
        
        // ルートデータ
        let userPoints = [];
        let savedRoute = []; // 保存された正解ルート
        const tolerance = 40; // 判定の甘さ（ピクセル数）

        // 起動時にスマホのメモリから過去に保存したデータを読み込む
        window.onload = function() {
            const localImage = localStorage.getItem('maze_image');
            const localRoute = localStorage.getItem('maze_route');
            if (localImage) {
                mazeBg.src = localImage;
                mazeBg.style.display = 'block';
            }
            if (localRoute) {
                savedRoute = JSON.parse(localRoute);
            }
        };

        // 画像が選択された時の処理
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                mazeBg.src = event.target.result;
                mazeBg.style.display = 'block';
                localStorage.setItem('maze_image', event.target.result); // 画像を保存
            };
            reader.readAsDataURL(file);
        });

        // モード切り替え：遊ぶ
        function startGame() {
            if (savedRoute.length === 0 && !mazeBg.src) {
                alert("先に管理者メニューから迷路とルートを登録してください！");
                return;
            }
            isAdminMode = false;
            pageTitle.innerText = "⚔️ CLanからの挑戦状 ⚔️";
            guideText.innerText = "スタートからゴールまでなぞってね！";
            adminControls.style.display = 'none';
            menuPage.classList.remove('active');
            gamePage.classList.add('active');
            resetCanvas();
        }

        // モード切り替え：管理者
        function openAdmin() {
            isAdminMode = true;
            pageTitle.innerText = "🛠 迷路ルート開発モード";
            guideText.innerText = "お手本となる正解ルートをなぞってください。";
            adminControls.style.display = 'block';
            menuPage.classList.remove('active');
            gamePage.classList.add('active');
            resetCanvas();
        }

        function goBackMenu() {
            gamePage.classList.remove('active');
            menuPage.classList.add('active');
        }

        function resetCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            userPoints = [];
        }

        // --- タッチ操作の処理 ---
        canvas.addEventListener('touchstart', (e) => {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            userPoints = [{ x, y }];
            
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineWidth = 6;
            ctx.strokeStyle = isAdminMode ? "rgba(255, 0, 0, 0.6)" : "rgba(0, 0, 255, 0.6)"; 
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!isDrawing) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            userPoints.push({ x, y });

            ctx.lineTo(x, y);
            ctx.stroke();
        });

        canvas.addEventListener('touchend', () => {
            if (!isDrawing) return;
            isDrawing = false;
            
            if (!isAdminMode) {
                checkAnswer(); // プレイモードなら正誤判定
            }
        });

        // --- 管理者用：ルートの保存 ---
        function saveData() {
            if (userPoints.length < 10) {
                alert("ルートが短すぎます。正しくなぞれているか確認してください。");
                return;
            }
            // 容量削減のため、少し間引きして保存
            savedRoute = userPoints.filter((_, index) => index % 3 === 0);
            // 最後の点は必ず含める
            savedRoute.push(userPoints[userPoints.length - 1]);

            localStorage.setItem('maze_route', JSON.stringify(savedRoute));
            alert("迷路の正解ルートを保存しました！メニューに戻ってテストプレイしてみてください。");
            goBackMenu();
        }

        // --- プレイヤー用：正誤判定 ---
        function checkAnswer() {
            if (savedRoute.length === 0) {
                alert("正解ルートが登録されていません。");
                return;
            }

            const userStart = userPoints[0];
            const userEnd = userPoints[userPoints.length - 1];
            const correctStart = savedRoute[0];
            const correctEnd = savedRoute[savedRoute.length - 1];

            // 1. スタート位置チェック
            const distStart = Math.hypot(userStart.x - correctStart.x, userStart.y - correctStart.y);
            if (distStart > tolerance) {
                alert("残念！スタート位置がズレています。");
                resetCanvas();
                return;
            }

            // 2. ゴール位置チェック
            const distEnd = Math.hypot(userEnd.x - correctEnd.x, userEnd.y - correctEnd.y);
            if (distEnd > tolerance) {
                alert("残念！ゴールまでたどり着いていません。");
                resetCanvas();
                return;
            }

            // 3. 途中ルートチェック（お手本のチェックポイントを順番に通ったか）
            let correctCount = 0;
            let currentTargetIndex = 0;

            for (let uPt of userPoints) {
                if (currentTargetIndex >= savedRoute.length) break;
                
                let targetPt = savedRoute[currentTargetIndex];
                let dist = Math.hypot(uPt.x - targetPt.x, uPt.y - targetPt.y);
                
                // お手本の点に近づいたら、次のチェックポイントへ進む
                if (dist < tolerance) {
                    currentTargetIndex++;
                }
            }

            // お手本ルートの85%以上のポイントを順番に通過していれば合格
            const passRate = currentTargetIndex / savedRoute.length;
            if (passRate >= 0.85) {
                alert("✨ 正解！おめでとうございます！ ✨");
            } else {
                alert("残念！途中のルートが間違っているか、はみ出しています。");
                resetCanvas();
            }
        }
    </script>
</body>
</html>
